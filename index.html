<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>青昱 - 个人主页</title>
    <link id="favicon" rel="icon" href="./favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img id="bgA" class="wallpaper active">
    <img id="bgB" class="wallpaper">

    <div class="overlay"></div>
    <div class="vignette"></div>
    <div class="beam"></div>

    <canvas id="particleCanvas"></canvas>
    <div id="textRain"></div>

    <div class="hud">
        <div id="clock">--:--:--</div>
        <div id="date">----年--月--日</div>
    </div>

    <div class="main">
        <div id="mainTitle" class="title">正在初始化</div>
        <div id="subTitle" class="subtitle">Please wait...</div>
    </div>

    <div class="mouseGlow" id="mouseGlow"></div>
    
    <div id="musicControl" class="music-btn" style="display: none;">
        <span id="musicIcon">🔇</span>
    </div>

    <audio id="bgm"></audio>

    <script src="script.js"></script>
</body>
</html>
